<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#4f46e5">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Ayır — PDF Araç Kutusu</title>
<style>
  :root {
    --bg: #f8fafc; --surface: #ffffff; --text: #0f172a; --muted: #64748b;
    --border: #e2e8f0; --accent: #4f46e5; --accent-soft: #eef2ff;
    --orange: #ea580c; --orange-soft: #fff7ed; --danger: #e11d48;
    --radius: 18px; --shadow: 0 1px 2px rgba(15,23,42,.04), 0 8px 24px rgba(15,23,42,.06);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 16px 16px 64px; }

  .back { display:inline-flex; align-items:center; gap:6px; text-decoration:none; color:var(--muted);
    font-size:14px; font-weight:600; padding:8px 4px; }
  .back svg { width:18px; height:18px; }

  .head { display:flex; align-items:center; gap:12px; margin:6px 0 20px; }
  .head .icon { width:44px; height:44px; border-radius:13px; background:var(--orange-soft); color:var(--orange);
    display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .head .icon svg { width:24px; height:24px; }
  .head h1 { font-size:21px; font-weight:800; margin:0; letter-spacing:-.02em; }
  .head p { margin:1px 0 0; color:var(--muted); font-size:13px; }

  /* Dropzone */
  .drop { border:2px dashed #cbd5e1; border-radius:var(--radius); background:var(--surface);
    padding:34px 20px; text-align:center; cursor:pointer; transition:.15s; }
  .drop.hot { border-color:var(--orange); background:var(--orange-soft); }
  .drop .di { width:52px; height:52px; border-radius:15px; background:var(--orange-soft); color:var(--orange);
    display:inline-flex; align-items:center; justify-content:center; margin-bottom:12px; }
  .drop .di svg { width:28px; height:28px; }
  .drop .t { font-weight:700; font-size:15.5px; }
  .drop .s { color:var(--muted); font-size:13px; margin-top:4px; }

  /* Dosya çubuğu */
  .filebar { display:flex; align-items:center; gap:12px; background:var(--surface);
    border:1px solid var(--border); border-radius:14px; padding:12px 14px; box-shadow:var(--shadow); }
  .filebar .fico { width:38px; height:46px; border-radius:7px; background:var(--orange-soft); color:var(--orange);
    display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .filebar .fico svg { width:20px; height:20px; }
  .filebar .fi { min-width:0; flex:1; }
  .filebar .fi .n { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .filebar .fi .s { font-size:12px; color:var(--muted); }
  .filebar .change { border:1px solid var(--border); background:var(--surface); color:var(--muted);
    border-radius:10px; padding:8px 12px; font-size:13px; font-weight:600; cursor:pointer; flex:0 0 auto; }

  /* Seçim araç çubuğu */
  .seltools { display:flex; align-items:center; justify-content:space-between; margin:18px 2px 12px; gap:10px; }
  .seltools .cnt { font-size:14px; font-weight:700; }
  .seltools .cnt b { color:var(--orange); }
  .seltools .grp { display:flex; gap:8px; }
  .seltools button { border:1px solid var(--border); background:var(--surface); color:var(--text);
    border-radius:10px; padding:8px 12px; font-size:13px; font-weight:600; cursor:pointer; }
  .seltools button:active { background:#f1f5f9; }

  /* Thumbnail grid */
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(96px, 1fr)); gap:12px; }
  .cell { position:relative; cursor:pointer; border-radius:12px; overflow:hidden;
    border:2px solid transparent; background:var(--surface); box-shadow:var(--shadow);
    aspect-ratio:1/1.35; display:flex; align-items:center; justify-content:center; transition:.12s; }
  .cell canvas, .cell img { max-width:100%; max-height:100%; display:block; }
  .cell .ph { color:#cbd5e1; }
  .cell .ph svg { width:26px; height:26px; }
  .cell .pg { position:absolute; left:6px; bottom:6px; font-size:11px; font-weight:700; color:#fff;
    background:rgba(15,23,42,.62); border-radius:6px; padding:1px 7px; }
  .cell .chk { position:absolute; top:6px; right:6px; width:22px; height:22px; border-radius:50%;
    background:rgba(255,255,255,.85); border:1.5px solid #cbd5e1; display:flex; align-items:center;
    justify-content:center; color:#fff; transition:.12s; }
  .cell .chk svg { width:14px; height:14px; opacity:0; }
  .cell.sel { border-color:var(--orange); }
  .cell.sel .chk { background:var(--orange); border-color:var(--orange); }
  .cell.sel .chk svg { opacity:1; }
  .cell.sel::after { content:''; position:absolute; inset:0; background:var(--orange); opacity:.10; }

  .prog { text-align:center; color:var(--muted); font-size:13px; margin:14px 0; }

  /* Alt aksiyon çubuğu */
  .bar { position:sticky; bottom:0; margin-top:22px; padding:14px 0 4px;
    background:linear-gradient(to top, var(--bg) 78%, transparent); }
  .modeseg { display:flex; background:#eef2f7; border-radius:12px; padding:4px; gap:4px; margin-bottom:10px; }
  .modeseg button { flex:1; border:none; background:transparent; padding:10px 8px; border-radius:9px;
    font-size:13.5px; font-weight:600; color:var(--muted); cursor:pointer; transition:.12s; }
  .modeseg button.on { background:var(--surface); color:var(--text); box-shadow:0 1px 3px rgba(15,23,42,.12); }
  .btn { width:100%; border:none; border-radius:14px; padding:16px; font-size:16px; font-weight:700;
    background:var(--accent); color:#fff; cursor:pointer; display:flex; align-items:center;
    justify-content:center; gap:9px; box-shadow:0 8px 20px rgba(79,70,229,.3); transition:.15s; }
  .btn:active { transform:scale(.99); }
  .btn:disabled { background:#cbd5e1; box-shadow:none; cursor:default; }
  .btn svg { width:20px; height:20px; }
  .spin { width:18px; height:18px; border:2.5px solid rgba(255,255,255,.4); border-top-color:#fff;
    border-radius:50%; animation:sp .7s linear infinite; }
  @keyframes sp { to { transform:rotate(360deg); } }

  .hidden { display:none !important; }
  .toast { position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:#0f172a;
    color:#fff; padding:11px 18px; border-radius:12px; font-size:13.5px; font-weight:600;
    box-shadow:0 10px 30px rgba(0,0,0,.25); opacity:0; transition:.25s; pointer-events:none; z-index:50;
    max-width:90vw; text-align:center; }
  .toast.show { opacity:1; }
  .toast.err { background:var(--danger); }
</style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      Ana sayfa
    </a>

    <div class="head">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M20 4 8.12 15.88M14.47 14.48 20 20M8.12 8.12 12 12"/></svg>
      </span>
      <div>
        <h1>Ayır</h1>
        <p>Sayfaları seç: ayrı kaydet ya da çıkar</p>
      </div>
    </div>

    <input type="file" id="file" accept="application/pdf,.pdf" class="hidden">

    <div class="drop" id="drop">
      <div class="di">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m8 7 4-4 4 4"/><path d="M20 21H4a2 2 0 0 1-2-2v-4"/></svg>
      </div>
      <div class="t">PDF aç</div>
      <div class="s">Dokun ya da buraya sürükle · tek dosya</div>
    </div>

    <div id="editor" class="hidden">
      <div class="filebar">
        <span class="fico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
        </span>
        <div class="fi">
          <div class="n" id="fname">—</div>
          <div class="s" id="fmeta">—</div>
        </div>
        <button class="change" id="change">Değiştir</button>
      </div>

      <div class="seltools">
        <div class="cnt"><b id="selcnt">0</b> / <span id="totcnt">0</span> seçili</div>
        <div class="grp">
          <button id="selall">Tümü</button>
          <button id="selclear">Temizle</button>
        </div>
      </div>

      <div class="grid" id="grid"></div>
      <div class="prog hidden" id="prog"></div>
    </div>

    <div class="bar hidden" id="actionbar">
      <div class="modeseg" id="modeseg">
        <button data-v="extract" class="on">Seçilenleri ayır</button>
        <button data-v="remove">Seçilenleri çıkar</button>
      </div>
      <button class="btn" id="go" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M12 18v-6"/><path d="m9 15 3 3 3-3"/></svg>
        <span id="go-text">PDF oluştur</span>
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="lib/pdf.min.js"></script>
  <script src="lib/pdf-lib.min.js"></script>
  <script>
  (function () {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'lib/pdf.worker.min.js';
    const { PDFDocument } = PDFLib;

    const $ = (s) => document.querySelector(s);
    const drop = $('#drop'), fileInput = $('#file'), editor = $('#editor'), actionbar = $('#actionbar');
    const grid = $('#grid'), prog = $('#prog');
    const selcntEl = $('#selcnt'), totcntEl = $('#totcnt');
    const goBtn = $('#go'), goText = $('#go-text');

    let file = null;          // seçilen PDF File
    let pdfjsDoc = null;      // pdf.js dokümanı (thumbnail için)
    let numPages = 0;
    let selected = new Set(); // 1-tabanlı seçili sayfa numaraları
    let mode = 'extract';
    let renderToken = 0;      // yeni dosya yüklenince eski render'ı iptal et

    // ---- Dosya seçme ----
    drop.addEventListener('click', () => fileInput.click());
    $('#change').addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); fileInput.value = ''; });

    ['dragenter', 'dragover'].forEach(ev =>
      drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add('hot'); }));
    ['dragleave', 'drop'].forEach(ev =>
      drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.remove('hot'); }));
    drop.addEventListener('drop', (e) => {
      const f = e.dataTransfer && Array.from(e.dataTransfer.files).find(x => x.type === 'application/pdf' || /\.pdf$/i.test(x.name));
      if (f) handleFile(f); else toast('PDF dosyası bulunamadı', true);
    });

    async function handleFile(f) {
      file = f;
      selected = new Set();
      const token = ++renderToken;
      // pdf.js dokümanını yükle (buffer'ı ayrı kopyayla ver; kaydederken File'dan tekrar okunacak)
      let doc;
      try {
        const buf = await f.arrayBuffer();
        doc = await pdfjsLib.getDocument({ data: new Uint8Array(buf.slice(0)) }).promise;
      } catch (err) {
        console.error(err);
        toast('PDF açılamadı: ' + (err.message || 'geçersiz dosya'), true);
        return;
      }
      if (token !== renderToken) return;
      pdfjsDoc = doc; numPages = doc.numPages;

      drop.classList.add('hidden');
      editor.classList.remove('hidden');
      actionbar.classList.remove('hidden');
      $('#fname').textContent = f.name;
      $('#fmeta').textContent = `${numPages} sayfa · ${fmtSize(f.size)}`;
      totcntEl.textContent = numPages;
      grid.innerHTML = '';
      updateSel();

      // Boş hücreleri kur (tıklanabilir), sonra sırayla thumbnail render et
      const cells = [];
      for (let p = 1; p <= numPages; p++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.page = p;
        cell.innerHTML = `
          <span class="ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="3" width="16" height="18" rx="2"/></svg></span>
          <span class="pg">${p}</span>
          <span class="chk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>`;
        cell.addEventListener('click', () => toggle(p, cell));
        grid.appendChild(cell);
        cells.push(cell);
      }

      prog.classList.remove('hidden');
      for (let p = 1; p <= numPages; p++) {
        if (token !== renderToken) return;  // yeni dosya geldi, iptal
        prog.textContent = `Önizlemeler oluşturuluyor ${p}/${numPages}`;
        try {
          const page = await doc.getPage(p);
          const base = page.getViewport({ scale: 1 });
          const scale = (200 / base.width) * (window.devicePixelRatio || 1);
          const vp = page.getViewport({ scale });
          const canvas = document.createElement('canvas');
          canvas.width = Math.ceil(vp.width); canvas.height = Math.ceil(vp.height);
          canvas.style.width = '100%'; canvas.style.height = 'auto';
          await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
          if (token !== renderToken) return;
          const ph = cells[p - 1].querySelector('.ph');
          if (ph) ph.remove();
          cells[p - 1].insertBefore(canvas, cells[p - 1].firstChild);
        } catch (err) { console.error('render page', p, err); }
      }
      prog.classList.add('hidden');
    }

    function toggle(p, cell) {
      if (selected.has(p)) { selected.delete(p); cell.classList.remove('sel'); }
      else { selected.add(p); cell.classList.add('sel'); }
      updateSel();
    }

    $('#selall').addEventListener('click', () => {
      selected = new Set(Array.from({ length: numPages }, (_, i) => i + 1));
      grid.querySelectorAll('.cell').forEach(c => c.classList.add('sel'));
      updateSel();
    });
    $('#selclear').addEventListener('click', () => {
      selected.clear();
      grid.querySelectorAll('.cell').forEach(c => c.classList.remove('sel'));
      updateSel();
    });

    // ---- Mod ----
    $('#modeseg').addEventListener('click', (e) => {
      const b = e.target.closest('button'); if (!b) return;
      $('#modeseg').querySelectorAll('button').forEach(x => x.classList.remove('on'));
      b.classList.add('on'); mode = b.dataset.v; updateSel();
    });

    function updateSel() {
      const k = selected.size;
      selcntEl.textContent = k;
      let ok, label;
      if (mode === 'extract') {
        ok = k >= 1;
        label = `Ayrı PDF yap · ${k} sayfa`;
      } else {
        ok = k >= 1 && k < numPages;
        const kalan = numPages - k;
        label = k >= numPages ? 'En az bir sayfa kalmalı' : `Seçilenleri çıkar · ${kalan} sayfa kalır`;
      }
      goText.textContent = label;
      goBtn.disabled = !ok;
    }

    // ---- Oluştur ----
    goBtn.addEventListener('click', run);

    async function run() {
      const k = selected.size;
      if (mode === 'extract' && k < 1) return;
      if (mode === 'remove' && (k < 1 || k >= numPages)) return;

      goBtn.disabled = true;
      const svg = goBtn.querySelector('svg'); svg.classList.add('hidden');
      const spin = document.createElement('span'); spin.className = 'spin'; goBtn.insertBefore(spin, goText);
      const orig = goText.textContent; goText.textContent = 'Oluşturuluyor…';

      try {
        const bytes = new Uint8Array(await file.arrayBuffer());   // pdf-lib için taze oku
        const src = await PDFDocument.load(bytes, { ignoreEncryption: true });
        const out = await PDFDocument.create();

        // Hangi sayfalar (1-tabanlı → 0-tabanlı), orijinal sırada
        let keep;
        if (mode === 'extract') keep = [...selected].sort((a, b) => a - b);
        else keep = Array.from({ length: numPages }, (_, i) => i + 1).filter(p => !selected.has(p));
        const idx0 = keep.map(p => p - 1);

        const pages = await out.copyPages(src, idx0);
        pages.forEach(pg => out.addPage(pg));

        const data = await out.save();
        const base = (file.name || 'belge').replace(/\.pdf$/i, '');
        const suffix = mode === 'extract' ? 'ayrilan' : 'cikarilmis';
        downloadPdf(data, `${base}-${suffix}.pdf`);
        toast(`PDF hazır ✓ · ${idx0.length} sayfa`);
      } catch (err) {
        console.error(err);
        toast('Hata: ' + (err.message || 'oluşturulamadı'), true);
      } finally {
        spin.remove(); svg.classList.remove('hidden'); goText.textContent = orig;
        updateSel();
      }
    }

    function downloadPdf(bytes, name) {
      const blob = new Blob([bytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = name;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 4000);
    }

    // ---- Yardımcılar ----
    function fmtSize(b) {
      if (b < 1024) return b + ' B';
      if (b < 1048576) return (b / 1024).toFixed(0) + ' KB';
      return (b / 1048576).toFixed(1) + ' MB';
    }
    let toastT;
    function toast(msg, err) {
      const t = $('#toast');
      t.textContent = msg; t.classList.toggle('err', !!err); t.classList.add('show');
      clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove('show'), 2800);
    }
  })();
  </script>
</body>
</html>
